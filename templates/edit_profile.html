{% extends "base.html" %}
{% block title %}Edit Profile - Bureau Management{% endblock %}
{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <h1>✏️ Edit Profile</h1>
    
    <div class="card">
        <div style="text-align: center; margin-bottom: 2rem;">
            <img src="{{ profile_pic }}" alt="Current Profile" style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid #e94560;">
        </div>
        
        <form method="POST" action="{{ url_for('edit_profile') }}" enctype="multipart/form-data">
            <div class="form-group">
                <label>Current Profile Picture</label>
                <input type="file" name="profile_pic" accept="image/*" onchange="previewImage(this)">
                <p style="font-size: 0.8rem; color: #888; margin-top: 0.25rem;">Leave empty to keep current picture</p>
                <img id="preview" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #e94560; margin-top: 0.5rem; display: none;" alt="New Preview">
            </div>
            
            <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" name="name" value="{{ user.name }}" required>
                </div>
                <div class="form-group">
                    <label>Family Name</label>
                    <input type="text" name="family_name" value="{{ user.family_name }}" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="user_name" value="{{ user.user_name }}" required>
            </div>
            
            <hr style="border: 1px solid #0f3460; margin: 1.5rem 0;">
            <p style="color: #a0a0a0; margin-bottom: 1rem;">Change Password (leave blank to keep current)</p>
            
            <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" name="new_password" placeholder="Enter new password">
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" name="confirm_password" placeholder="Confirm new password">
                </div>
            </div>
            
            <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                <button type="submit" class="btn btn-success">💾 Save Changes</button>
                <a href="{{ url_for('profile') }}" class="btn btn-primary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
    function previewImage(input) {
        const preview = document.getElementById('preview');
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
{% endblock %}
